<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 BRICK SLASH 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            width: 100vw;
            height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #000822 0%, #002244 100%);
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px black;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00aaff;
        }
        
        .stat {
            margin: 5px 0;
        }
        
        .stat span {
            color: #00ffff;
            font-weight: bold;
            font-size: 24px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            background: #0088ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            opacity: 0;
            pointer-events: none;
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffff88;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
            font-size: 14px;
        }
        
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }
        
        .scorePopup {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            color: #ffff00;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1s forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
        
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="color: #00ffff; font-size: 18px;">LOADING GAME...</div>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="stat">🏆 Score: <span id="score">0</span></div>
            <div class="stat">⚡ Combo: <span id="combo">x1.0</span></div>
            <div class="stat">⏰ Time: <span id="time">300</span>s</div>
            <div class="stat">🧱 Bricks: <span id="bricks">0/0</span></div>
        </div>
        
        <div id="comboDisplay">COMBO!</div>
        
        <div class="instructions">
            <strong>🎮 HOW TO PLAY:</strong><br>
            • Touch & swipe to slash bricks<br>
            • Diagonal slashes = More points!<br>
            • Destroy all bricks in 5 minutes
        </div>
        
        <div id="controls">
            <button onclick="startGame()">▶️ START</button>
            <button onclick="resetGame()">🔄 RESTART</button>
            <button onclick="toggleSound()">🔊 SOUND</button>
        </div>
    </div>

    <script>
        // ====== GAME ENGINE ======
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let game = {
            active: false,
            score: 0,
            combo: 1.0,
            timeLeft: 300,
            bricks: [],
            particles: [],
            isSlashing: false,
            lastPoint: {x: 0, y: 0},
            soundEnabled: true,
            totalBricks: 0,
            destroyedBricks: 0
        };
        
        // Initialize
        function init() {
            // Set canvas size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Hide loading screen after 500ms
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                startGame();
            }, 500);
            
            // Setup input
            setupInput();
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        function setupInput() {
            // Touch events
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleStart(e.touches[0]);
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!game.isSlashing || !game.active) return;
                handleMove(e.touches[0]);
            });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                game.isSlashing = false;
            });
            
            // Mouse events
            canvas.addEventListener('mousedown', (e) => handleStart(e));
            canvas.addEventListener('mousemove', (e) => {
                if (!game.isSlashing || !game.active) return;
                handleMove(e);
            });
            
            canvas.addEventListener('mouseup', () => game.isSlashing = false);
        }
        
        function handleStart(e) {
            if (!game.active) return;
            
            const rect = canvas.getBoundingClientRect();
            game.lastPoint = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            game.isSlashing = true;
            playSound('slash');
        }
        
        function handleMove(e) {
            const rect = canvas.getBoundingClientRect();
            const point = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            // Draw slash trail
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(game.lastPoint.x, game.lastPoint.y);
            ctx.lineTo(point.x, point.y);
            ctx.stroke();
            
            // Add glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Check collision
            checkCollision(game.lastPoint, point);
            
            game.lastPoint = point;
        }
        
        function checkCollision(p1, p2) {
            for (let i = game.bricks.length - 1; i >= 0; i--) {
                const brick = game.bricks[i];
                
                // Simple line-circle collision
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                
                if (length === 0) continue;
                
                const dot = ((brick.x - p1.x) * dx + (brick.y - p1.y) * dy) / (length * length);
                const closestX = p1.x + dot * dx;
                const closestY = p1.y + dot * dy;
                
                const distance = Math.sqrt(
                    Math.pow(brick.x - closestX, 2) + 
                    Math.pow(brick.y - closestY, 2)
                );
                
                if (distance < brick.size / 2) {
                    destroyBrick(i);
                    break;
                }
            }
        }
        
        function destroyBrick(index) {
            const brick = game.bricks[index];
            
            // Add score
            const points = Math.floor(100 * game.combo);
            game.score += points;
            game.destroyedBricks++;
            
            // Show score popup
            showScore(points, brick.x, brick.y);
            
            // Create particles
            createParticles(brick);
            
            // Remove brick
            game.bricks.splice(index, 1);
            
            // Update combo (diagonal bonus)
            const dx = Math.abs(game.lastPoint.x - brick.x);
            const dy = Math.abs(game.lastPoint.y - brick.y);
            if (dx > 20 && dy > 20) {
                game.combo = Math.min(game.combo + 0.2, 5.0);
                showCombo('DIAGONAL! x' + game.combo.toFixed(1));
            }
            
            // Update UI
            updateUI();
            
            // Check win
            if (game.bricks.length === 0) {
                endGame(true);
            }
        }
        
        function createParticles(brick) {
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = brick.x + 'px';
                particle.style.top = brick.y + 'px';
                particle.style.backgroundColor = brick.color;
                
                const size = Math.random() * 6 + 3;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                let x = brick.x, y = brick.y, opacity = 1;
                
                function animate() {
                    x += vx;
                    y += vy;
                    opacity -= 0.03;
                    
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                }
                
                requestAnimationFrame(animate);
            }
        }
        
        function showScore(points, x, y) {
            const popup = document.createElement('div');
            popup.className = 'scorePopup';
            popup.textContent = '+' + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 1000);
        }
        
        function showCombo(text) {
            const display = document.getElementById('comboDisplay');
            display.textContent = text;
            display.style.opacity = '1';
            
            setTimeout(() => {
                display.style.opacity = '0';
            }, 1000);
        }
        
        function generateBricks(count) {
            game.bricks = [];
            game.totalBricks = count;
            game.destroyedBricks = 0;
            
            const colors = ['#0088ff', '#ff8800', '#ff44ff', '#00ff88', '#ffff00'];
            
            for (let i = 0; i < count; i++) {
                game.bricks.push({
                    x: 60 + Math.random() * (canvas.width - 120),
                    y: 60 + Math.random() * (canvas.height - 120),
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: 50 + Math.random() * 30,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    health: Math.random() > 0.8 ? 2 : 1
                });
            }
        }
        
        function drawBricks() {
            game.bricks.forEach(brick => {
                // Update position
                brick.x += brick.vx;
                brick.y += brick.vy;
                
                // Bounce off walls
                if (brick.x < brick.size/2 || brick.x > canvas.width - brick.size/2) {
                    brick.vx *= -0.9;
                }
                if (brick.y < brick.size/2 || brick.y > canvas.height - brick.size/2) {
                    brick.vy *= -0.9;
                }
                
                // Draw brick
                ctx.fillStyle = brick.color;
                ctx.fillRect(brick.x - brick.size/2, brick.y - brick.size/2, brick.size, brick.size);
                
                // Border
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(brick.x - brick.size/2, brick.y - brick.size/2, brick.size, brick.size);
                
                // Health indicator
                if (brick.health > 1) {
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(brick.x - brick.size/2, brick.y - brick.size/2 - 8, brick.size, 4);
                }
            });
        }
        
        function updateUI() {
            document.getElementById('score').textContent = game.score;
            document.getElementById('combo').textContent = 'x' + game.combo.toFixed(1);
            document.getElementById('time').textContent = Math.ceil(game.timeLeft);
            document.getElementById('bricks').textContent = game.destroyedBricks + '/' + game.totalBricks;
        }
        
        function gameLoop() {
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(0, 10, 30, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (game.active) {
                // Update time
                game.timeLeft -= 1/60;
                if (game.timeLeft <= 0) {
                    game.timeLeft = 0;
                    endGame(false);
                }
                
                // Draw game
                drawBricks();
                
                // Update UI
                updateUI();
                
                // Combo decay
                game.combo = Math.max(1.0, game.combo * 0.999);
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            game.active = true;
            game.score = 0;
            game.combo = 1.0;
            game.timeLeft = 300;
            
            // Clear old particles
            document.querySelectorAll('.particle, .scorePopup').forEach(el => el.remove());
            
            // Generate bricks (adjust count based on screen size)
            const brickCount = Math.min(30, Math.floor((canvas.width * canvas.height) / 8000));
            generateBricks(brickCount);
            
            updateUI();
        }
        
        function resetGame() {
            startGame();
        }
        
        function endGame(victory) {
            game.active = false;
            
            const message = victory ? 
                '🎉 VICTORY! Final Score: ' + game.score :
                '⏰ TIME UP! Final Score: ' + game.score;
            
            alert(message + '\n\nPlay again?');
            
            // Restart after alert
            setTimeout(startGame, 100);
        }
        
        function toggleSound() {
            game.soundEnabled = !game.soundEnabled;
            const btn = document.querySelector('#controls button:nth-child(3)');
            btn.textContent = game.soundEnabled ? '🔊 SOUND' : '🔇 SOUND';
        }
        
        // Sound system using Web Audio API (works offline)
        function playSound(type) {
            if (!game.soundEnabled) return;
            
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'slash') {
                    // Create slash sound
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.1);
                }
            } catch (e) {
                // Silent fail if audio not supported
            }
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Start the game
        init();
    </script>
</body>
</html>
